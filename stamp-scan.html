<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">

    <title>スタンプスキャン</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/stamp-scan.css">

    <script type="importmap">
    {
        "imports": {
            "three":"https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.module.js",
            "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.156.1/examples/jsm/",
            "mindar-image-three":"https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
        }
    }
    </script>
</head>

<body>

    <main id="phone">

        <section id="scanIntro" class="scan-intro">

            <div class="scan-icon">📷</div>

            <h1>パネルSCAN</h1>

            <p>
                スタンプを獲得するには、<br>
                会場のキャラクターパネルをスキャンしてください。
            </p>

            <div class="notice-box">
                <p>・カメラの使用を許可してください。</p>
                <p>・周囲に注意してご利用ください。</p>
                <p>・歩きながらの操作はおやめください。</p>
            </div>

            <button id="startARButton" type="button">
                SCAN開始
            </button>

        </section>

        <div id="arContainer"></div>

        <div id="stampMessage"></div>

        <div id="scanText">
            パネルを画面中央に合わせてください
        </div>

        <div id="safetyMessage">
            周囲に注意し、歩きながら使用しないでください
        </div>

        <div id="debugText">
            AR起動準備中...
        </div>

    </main>

    <a id="homeButton" href="home.html">🏠</a>

    <audio
        id="stampGetSound"
        src="./assets/sounds/stamp.mp3"
        preload="auto">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script type="module" src="js/stamp-scan.js"></script>

</body>

</html>
