<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

    <title>キャラクターカード</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/character-card.css">
</head>

<body>

    <main class="card-page">

        <section class="character-card">

            <div class="card-header">
                <span class="card-badge">GET</span>
                <h1 id="characterName">キャラクター</h1>
            </div>

            <div class="card-image-frame">
                <img id="characterCardImage" class="character-card-image" src="" alt="">
            </div>

            <p class="card-text">
                キャラクターカードを獲得しました！
            </p>

            <div class="card-actions">

                <button id="voiceButton" class="voice-button" type="button">
                    🔊 音声再生
                </button>

                <button id="arButton" class="ar-button" type="button">
                    ARで見る
                </button>

                <button id="closeButton" class="close-button" type="button">
                    閉じる
                </button>

            </div>

        </section>

        <audio id="characterVoice" preload="auto"></audio>

    </main>

    <a id="homeButton" href="home.html">🏠</a>

    <script type="module" src="js/character-card.js"></script>

</body>

</html>
