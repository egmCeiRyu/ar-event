<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>スタンプラリー</title>

    <link rel="stylesheet" href="css/stamp-rally.css">
    <link rel="stylesheet" href="css/common.css">
</head>

<body>

    <div class="container">

        <h1>スタンプラリー</h1>

        <div class="subtitle">
            キャラクタースタンプを集めよう！
        </div>

        <div class="stamp-grid">

            <button class="stamp-card locked" data-character-id="4" type="button">
                <img class="stamp" src="assets/stamps/stamp01.png" alt="スタンプ01">
                <span class="stamp-label">スタンプ 01</span>
            </button>

            <button class="stamp-card locked" data-character-id="5" type="button">
                <img class="stamp" src="assets/stamps/stamp02.png" alt="スタンプ02">
                <span class="stamp-label">スタンプ 02</span>
            </button>

            <button class="stamp-card locked" data-character-id="6" type="button">
                <img class="stamp" src="assets/stamps/stamp03.png" alt="スタンプ03">
                <span class="stamp-label">スタンプ 03</span>
            </button>

            <button class="stamp-card locked" data-character-id="7" type="button">
                <img class="stamp" src="assets/stamps/stamp04.png" alt="スタンプ04">
                <span class="stamp-label">スタンプ 04</span>
            </button>

            <button class="stamp-card locked" data-character-id="8" type="button">
                <img class="stamp" src="assets/stamps/stamp05.png" alt="スタンプ05">
                <span class="stamp-label">スタンプ 05</span>
            </button>

            <button class="stamp-card locked" data-character-id="9" type="button">
                <img class="stamp" src="assets/stamps/stamp06.png" alt="スタンプ06">
                <span class="stamp-label">スタンプ 06</span>
            </button>

            <button class="stamp-card locked" data-character-id="10" type="button">
                <img class="stamp" src="assets/stamps/stamp07.png" alt="スタンプ07">
                <span class="stamp-label">スタンプ 07</span>
            </button>

            <button class="stamp-card locked" data-character-id="11" type="button">
                <img class="stamp" src="assets/stamps/stamp08.png" alt="スタンプ08">
                <span class="stamp-label">スタンプ 08</span>
            </button>

        </div>

        <div class="stamp-level-card">

            <div class="level-header">
                <span>スタンプ獲得状況</span>
                <strong id="progressText">0 / 8</strong>
            </div>

            <div class="progress-bar">
                <div id="progressFill"></div>
            </div>

            <div id="rewardBox" class="reward-box">

                <div class="reward-icon">🏆</div>

                <div class="reward-text">
                    <strong>コンプリート特典</strong>
                    <p>8つのスタンプを集めると特典がもらえるよ！</p>
                </div>

                <div class="reward-gift">🎁</div>

            </div>

            <p class="reward-note">
                ※ 特典の内容は変更になる場合があります。
            </p>

        </div>

        <div id="completeBox" class="complete-box">

            🎉 COMPLETE!
            <br>
            8つのスタンプを集めました！

            <br><br>

            <a
                id="giftButton"
                class="gift-button"
                href="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExNGJqZXp5NHF0b2p1ZjgwNXpkdTJucGtmamplcG0xMTc5b3Vibjc4MSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/FIZ1QC610AAhi/giphy.gif"
                target="_blank"
            >
                🎁 プレゼントを受け取る
            </a>

        </div>

        <div class="buttons">

            <button class="back" onclick="location.href='stamp-scan.html'" type="button">
                SCAN開始
            </button>

            <button class="reset" onclick="resetStamps()" type="button">
                テストリセット
            </button>

        </div>

    </div>

    <a id="homeButton" href="home.html">🏠</a>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script type="module" src="js/stamp-rally.js"></script>

</body>

</html>
