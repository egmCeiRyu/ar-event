<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stamp Book</title>

    <link rel="stylesheet" href="css/stampbook.css">
    <link rel="stylesheet" href="css/common.css">
    
</head>

<body>

    <div class="container">

        <h1>Stamp Book</h1>
        <div class="subtitle">
            キャラクタースタンプを集めよう！
        </div>

        <div class="stamp-grid">

            <div class="stamp-card">
                <img id="stamp01" class="stamp locked" src="assets/stamps/stamp01.png">
                <div class="stamp-label">Stamp 01</div>
            </div>

            <div class="stamp-card">
                <img id="stamp02" class="stamp locked" src="assets/stamps/stamp02.png">
                <div class="stamp-label">Stamp 02</div>
            </div>

            <div class="stamp-card">
                <img id="stamp03" class="stamp locked" src="assets/stamps/stamp03.png">
                <div class="stamp-label">Stamp 03</div>
            </div>

        </div>

        <div class="stamp-level-card">

            <div class="level-header">
                <span>スタンプ獲得状況</span>
                <strong id="progressText">0 / 3</strong>
            </div>

            <div class="progress-bar">
                <div id="progressFill"></div>
            </div>

            <div id="rewardBox" class="reward-box">
                <div class="reward-icon">🏆</div>

                <div class="reward-text">
                    <strong>コンプリート特典</strong>
                    <p>3つのスタンプを集めると特典がもらえるよ！</p>
                </div>

                <div class="reward-gift">🎁</div>
            </div>

            <p class="reward-note">
                ※ 特典の内容は変更になる場合があります。
            </p>

        </div>

        <div id="completeBox" class="complete-box">
            🎉 COMPLETE!<br>
            3つのスタンプを集めました！

            <br><br>

            <a id="giftButton" class="gift-button" href="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExNGJqZXp5NHF0b2p1ZjgwNXpkdTJucGtmamplcG0xMTc5b3Vibjc4MSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/FIZ1QC610AAhi/giphy.gif" target="_blank">
                🎁 プレゼントを受け取る
            </a>
        </div>

        <div class="buttons">
            <button class="back" onclick="location.href='character.html'">
                Back
            </button>

            <button class="reset" onclick="resetStamps()">
                Reset Test
            </button>
        </div>

        
    </div>

    <a id="homeButton" href="index.html">🏠</a>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/stampbook.js"></script>
</body>

</html>
