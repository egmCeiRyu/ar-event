<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/photoframe.css">

<title>Photo Frame</title>
</head>

<body>

<div id="cameraPage">

    <video
        id="cameraVideo"
        autoplay
        playsinline
        muted>
    </video>

    <img
        id="selectedPhotoFrame"
        alt="フォトフレーム">

    <canvas id="captureCanvas"></canvas>

    <button
        id="switchCameraBtn"
        class="switch-camera-btn"
        type="button"
        aria-label="カメラ切替">

        <svg
            class="switch-camera-icon"
            viewBox="0 0 64 64"
            aria-hidden="true">

            <!-- top arrow -->
            <path
                class="switch-arrow"
                d="M18 21
                C23 13 32 9 42 12
                C47 13.5 51 16.5 54 21" />

            <path
                class="switch-arrow"
                d="M54 21
                L54 12
                M54 21
                L45 21" />

            <!-- camera body -->
            <path
                class="switch-camera-body"
                d="M20 27
                H26
                L29 23
                H35
                L38 27
                H44
                C47 27 49 29 49 32
                V43
                C49 46 47 48 44 48
                H20
                C17 48 15 46 15 43
                V32
                C15 29 17 27 20 27 Z" />

            <!-- lens -->
            <circle
                class="switch-camera-lens"
                cx="32"
                cy="38"
                r="7" />

            <!-- small camera dot -->
            <circle
                class="switch-camera-dot"
                cx="43"
                cy="32"
                r="1.8" />

            <!-- bottom arrow -->
            <path
                class="switch-arrow"
                d="M46 43
                C41 51 32 55 22 52
                C17 50.5 13 47.5 10 43" />

            <path
                class="switch-arrow"
                d="M10 43
                L10 52
                M10 43
                L19 43" />

        </svg>

    </button>

    <nav class="bottom-menu">

        <a
            id="homeBtn"
            class="bottom-menu-btn"
            href="index.html"
            aria-label="ホーム">

            <svg class="bottom-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 10.8L12 3l9 7.8v9.7a.5.5 0 0 1-.5.5H15v-6h-6v6H3.5a.5.5 0 0 1-.5-.5v-9.7Z"/>
            </svg>

            <span class="bottom-label">ホーム</span>
        </a>

        <button
            id="captureBtn"
            class="capture-main-btn"
            type="button"
            aria-label="撮影">

            <svg
                class="capture-camera-icon"
                viewBox="0 0 64 64"
                aria-hidden="true">

                <path
                    d="M21 24L25 18H39L43 24H48C51.3 24 54 26.7 54 30V45C54 48.3 51.3 51 48 51H16C12.7 51 10 48.3 10 45V30C10 26.7 12.7 24 16 24H21Z">
                </path>

                <circle
                    cx="32"
                    cy="38"
                    r="10">
                </circle>

                <circle
                    cx="47"
                    cy="31"
                    r="2.5">
                </circle>
            </svg>

        </button>

        <button
            id="openFramePanelBtn"
            class="bottom-menu-btn"
            type="button"
            aria-label="フレーム">

            <svg class="bottom-icon" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="4" y="5" width="16" height="14" rx="2"/>
                <rect x="7" y="8" width="10" height="8" rx="1.2"/>
                <circle cx="17" cy="7" r="1.2"/>
            </svg>

            <span class="bottom-label">フレーム</span>
        </button>

    </nav>

    <section
        id="framePanel"
        class="frame-panel hidden">

        <button
            id="closeFramePanelBtn"
            class="frame-panel-close"
            type="button">
            ✕
        </button>

        <div class="frame-panel-title">
            フレームを選択してください
        </div>

        <div
            id="frameCarousel"
            class="frame-carousel">
        </div>

    </section>

    <section
        id="previewArea"
        class="preview-area hidden">

        <img
            id="previewImage"
            alt="プレビュー">

        <div class="preview-bottom">
            <button
                id="retakeBtn"
                type="button">
                撮り直す
            </button>

            <button
                id="saveBtn"
                type="button">
                保存
            </button>
        </div>

    </section>

</div>

<script src="js/photoframe.js"></script>

</body>
</html>
