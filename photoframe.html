<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/photoframe.css">

<title>Photo Frame</title>
</head>

<body>

<div id="cameraPage">

    <video id="cameraVideo" autoplay playsinline muted></video>

    <img id="selectedPhotoFrame" alt="フォトフレーム">

    <canvas id="captureCanvas"></canvas>

    <div class="bottom-menu">
        <a class="menu-btn" href="index.html">
            <span>🏠</span>
            <small>ホーム</small>
        </a>

        <button id="captureBtn" class="capture-main-btn">
            <span>●</span>
            <small>撮影</small>
        </button>

        <button id="openFramePanelBtn" class="menu-btn">
            <span>🖼</span>
            <small>フレーム</small>
        </button>
    </div>

    <div id="framePanel" class="frame-panel hidden">
        <button id="closeFramePanelBtn" class="frame-panel-close">✕</button>

        <div class="frame-panel-title">
            フレームを選択してください
        </div>

        <div id="frameCarousel" class="frame-carousel"></div>
    </div>

    <div id="previewArea" class="preview-area hidden">
        <img id="previewImage" alt="プレビュー">

        <div class="preview-bottom">
            <button id="retakeBtn">撮り直す</button>
            <button id="saveBtn">保存</button>
        </div>
    </div>

</div>

<script src="js/photoframe.js"></script>

</body>
</html>
