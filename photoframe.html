<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/photoframe.css">

<title>Photo Frame</title>
</head>

<body>

<div id="cameraPage">

    <video
        id="cameraVideo"
        autoplay
        playsinline
        muted>
    </video>

    <img
        id="selectedPhotoFrame"
        alt="フォトフレーム">

    <canvas id="captureCanvas"></canvas>

    <nav class="bottom-menu">

        <a
            id="homeBtn"
            class="bottom-menu-btn"
            href="index.html">
            <span class="bottom-icon">🏠</span>
            <span class="bottom-label">ホーム</span>
        </a>

        <button
            id="captureBtn"
            class="capture-main-btn"
            type="button">
            <span class="capture-circle">●</span>
            <span class="bottom-label">撮影</span>
        </button>

        <button
            id="openFramePanelBtn"
            class="bottom-menu-btn"
            type="button">
            <span class="bottom-icon">🖼</span>
            <span class="bottom-label">フレーム</span>
        </button>

    </nav>

    <section
        id="framePanel"
        class="frame-panel hidden">

        <button
            id="closeFramePanelBtn"
            class="frame-panel-close"
            type="button">
            ✕
        </button>

        <div class="frame-panel-title">
            フレームを選択してください
        </div>

        <div
            id="frameCarousel"
            class="frame-carousel">
        </div>

    </section>

    <section
        id="previewArea"
        class="preview-area hidden">

        <img
            id="previewImage"
            alt="プレビュー">

        <div class="preview-bottom">
            <button
                id="retakeBtn"
                type="button">
                撮り直す
            </button>

            <button
                id="saveBtn"
                type="button">
                保存
            </button>
        </div>

    </section>

</div>

<script src="js/photoframe.js"></script>

</body>
</html>
