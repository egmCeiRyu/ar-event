<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Character</title>

    <link rel="stylesheet" href="css/character.css">
    <link rel="stylesheet" href="css/common.css">
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.156.1/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.156.1/examples/jsm/",
            "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
        }
    }
</script>
</head>

<body>
    <div id="phone">
        <button id="startARButton">▶ AR START</button>

        <div id="arContainer"></div>

        <div id="stampMessage"></div>

        <div id="stampGetOverlay">
            <div class="stamp-get-card">
                <div class="stamp-get-title">スタンプ GET!</div>
                <img id="stampGetImage" src="" alt="stamp">
                <div class="stamp-get-text">コレクションに追加されました</div>
            </div>
        </div>

        <div id="stampParticles"></div>

        <audio id="stampGetSound" src="./assets/sounds/stamp.mp3" preload="auto"></audio>

        <div id="scanText">スタンド画像をスキャンしてください</div>

        <!-- <div id="scanFrame">
            <span class="corner tl"></span>
            <span class="corner tr"></span>
            <span class="corner bl"></span>
            <span class="corner br"></span>
        </div> -->

        <button id="captureButton" aria-label="写真を撮る"></button>

        <div id="debugText">AR起動中...</div>
    </div>

    <a id="homeButton" href="index.html">🏠</a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script type="module" src="js/character.js"></script>
</body>
</html>
