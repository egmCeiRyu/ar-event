<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">

    <title>コンプリート</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/complete.css">

</head>

<body>

    <main class="complete-page">

        <section class="complete-card">

            <div class="complete-icon">
                🎉
            </div>

            <h1>

                スタンプコンプリート！

            </h1>

            <p class="complete-message">

                おめでとうございます！<br>
                すべてのスタンプを集めました！

            </p>

            <div class="reward-image">

                <img
                    src="assets/reward/reward.webp"
                    alt="Reward">

            </div>

            <button
                id="playVoiceButton"
                class="main-button">

                ▶ お祝いボイス

            </button>

            <button
                id="rewardButton"
                class="main-button">

                🎁 報酬を見る

            </button>

        </section>

    </main>

    <audio
        id="completeVoice"
        preload="auto"
        src="assets/sounds/complete.mp3">
    </audio>

    <script src="js/complete.js"></script>

    <a id="homeButton" href="home.html">🏠</a>

</body>

</html>
